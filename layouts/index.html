{{ define "main" }}
  <section class="hero" style="min-height: 80vh; display: grid; place-items: center; text-align: center; position: relative; overflow: hidden;">
    <img
      src="{{ "images/resonara.png" | relURL }}"
      alt=""
      aria-hidden="true"
      style="position: absolute; inset: 50% auto auto 50%; transform: translate(-50%, -50%); width: min(85vw, 980px); opacity: 0.11; pointer-events: none;"
    />
    <div class="container" style="max-width: 760px; position: relative; z-index: 1;">
      <p class="eyebrow">Hier entsteht Resonara</p>
      <h1>Wir bauen etwas Besonderes.</h1>
      <p class="lead">
        Seid die ersten, die die empathische KI erleben können.
      </p>
      <div class="cta-row" style="justify-content: center;">
        <a
          class="btn primary"
          href="https://forms.gle/1F6XoXEVQ4M9Sxud9"
          rel="noopener noreferrer"
          target="_blank"
        >
          Zur Warteliste
        </a>
      </div>
    </div>
  </section>
{{ end }}
